worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    server_tokens off;

    # -----------------------------------------------------------
    # Servidor HTTP - Redirige todo el trafico al puerto HTTPS
    # -----------------------------------------------------------
    server {
        listen 80;
        server_name localhost tu-subdominio.ddns.net;

        # Redireccion permanente 301 a HTTPS
        return 301 https://$host$request_uri;
    }

    # -----------------------------------------------------------
    # Servidor HTTPS - Punto de entrada principal
    # -----------------------------------------------------------
    server {
        listen 443 ssl;
        server_name localhost tu-subdominio.ddns.net;

        ssl_certificate     /etc/nginx/certs/cypherstudios.crt;
        ssl_certificate_key /etc/nginx/certs/cypherstudios.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        root /usr/share/nginx/html;
        index login.html;

        location / {
            try_files $uri $uri/ /login.html;
        }

        location /api/ {
            proxy_pass http://web:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
